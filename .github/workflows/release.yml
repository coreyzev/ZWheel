name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Decode keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build signed debug APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: gradle clean check :app:assembleDebug :wear:assembleDebug

      - name: Prepare release asset
        run: cp app/build/outputs/apk/debug/app-debug.apk zwheel-debug.apk

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: zwheel-debug
          path: zwheel-debug.apk

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release asset
        uses: actions/download-artifact@v4
        with:
          name: zwheel-debug
          path: .

      - name: Tag build
        run: |
          git tag "build-${{ github.run_number }}"
          git push origin "build-${{ github.run_number }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Debug Build #${{ github.run_number }}"
          files: zwheel-debug.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old releases (keep last 2)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[2:][].tagName' | \
            while IFS= read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag || true
            done
