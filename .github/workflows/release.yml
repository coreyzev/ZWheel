name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest successful CI run on main
        id: ci-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=ci.yml \
            --branch=main \
            --status=success \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful CI run found on main" >&2
            exit 1
          fi
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          echo "Using CI run $run_id"

      - name: Download APK from CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ steps.ci-run.outputs.run_id }} \
            --repo ${{ github.repository }} \
            --name=zwheel-debug \
            --dir=./artifacts
          mv artifacts/app-debug.apk zwheel-debug.apk

      - name: Tag build
        run: |
          git tag "build-${{ github.run_number }}"
          git push origin "build-${{ github.run_number }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Debug Build #${{ github.run_number }}"
          body: "Built from CI run ${{ steps.ci-run.outputs.run_id }} on `main`."
          files: zwheel-debug.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old releases (keep last 2)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[2:][].tagName' | \
            while IFS= read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag || true
            done
